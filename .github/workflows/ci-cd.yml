name: CI/CD Pipeline

# Run on pushes and PRs to main, so the pipeline gates every change.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to read-only token; individual jobs elevate only what they need.
permissions:
  contents: read

env:
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # 1. Test + SAST + dependency audit. Gates everything downstream.
  # ---------------------------------------------------------------------------
  test:
    name: Test & Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        run: pytest -q

      - name: Bandit static security analysis
        # SAST for common Python security issues (e.g., injection, weak crypto).
        run: bandit -r app -ll

      - name: pip-audit dependency scan
        # Software composition analysis: flags known CVEs in dependencies.
        run: pip-audit -r requirements.txt

  # ---------------------------------------------------------------------------
  # 2. CodeQL: GitHub-native semantic SAST, results surface in Security tab.
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ---------------------------------------------------------------------------
  # 3. Secret scanning with gitleaks (visible as a real pipeline run, in
  #    addition to GitHub's native push-protection enabled in repo settings).
  # ---------------------------------------------------------------------------
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # 4. Build image, scan it with Trivy, then push to GHCR (deploy step).
  #    Only runs on push to main, and only after the gates above pass.
  # ---------------------------------------------------------------------------
  build-scan-deploy:
    name: Build, Scan & Deploy
    runs-on: ubuntu-latest
    needs: [test, codeql, secrets]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write        # push to GHCR
      security-events: write # upload Trivy SARIF
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        # GHCR requires a lowercase path; repo names can contain uppercase.
        run: echo "IMAGE=${REGISTRY}/${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Build image (local, for scanning)
        run: docker build -t "$IMAGE:${{ github.sha }}" .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"   # report but don't hard-fail the demo build

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        run: |
          docker tag "$IMAGE:${{ github.sha }}" "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
